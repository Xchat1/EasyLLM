name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v2.0.0"
        required: true

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Test backend
        run: go test ./...

  windows:
    name: Windows amd64
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup MinGW for CGO
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "dev-${{ github.sha }}"
          }
          $version = $tag -replace '^v', ''
          if ($version.Length -gt 16 -and $version.StartsWith("dev-")) {
            $version = $version.Substring(0, 16)
          }
          "EASYLLM_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "GOARCH=amd64" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Enable MinGW for CGO
        shell: pwsh
        run: |
          $mingw = "C:\msys64\mingw64\bin"
          $env:PATH = "$mingw;$env:PATH"
          $mingw | Out-File -FilePath $env:GITHUB_PATH -Append
          gcc --version

      - name: Package Windows
        shell: pwsh
        run: .\scripts\package-windows.ps1

      - name: Privacy-check Windows package
        shell: bash
        run: scripts/check-release-archives.sh build/release/*.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyllm-windows-amd64
          path: build/release/*.zip
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.version }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="dev-${GITHUB_SHA::12}"
          fi
          echo "EASYLLM_VERSION=${tag#v}" >> "$GITHUB_ENV"
          echo "EASYLLM_PACKAGE_ARCH=${{ matrix.arch }}" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci --legacy-peer-deps

      - name: Package macOS App
        run: ./scripts/build-macos-app.sh --package

      - name: Privacy-check macOS package
        run: scripts/check-release-archives.sh build/release/*.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyllm-macos-${{ matrix.arch }}
          path: build/release/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
    if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Privacy-check release assets
        run: scripts/check-release-archives.sh dist/*.zip

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.zip > SHA256SUMS.txt

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.version }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.zip dist/SHA256SUMS.txt --clobber
          else
            gh release create "$tag" dist/*.zip dist/SHA256SUMS.txt --title "$tag" --generate-notes
          fi
